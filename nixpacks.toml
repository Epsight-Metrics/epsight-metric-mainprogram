[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = ["pip install --break-system-packages -r requirements-api.txt"]

[start]
cmd = "LD_LIBRARY_PATH=/nix/store/*-gcc-*/lib:$LD_LIBRARY_PATH python -m uvicorn cv_api:app --host 0.0.0.0 --port $PORT"
